<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MASKD 管理ダッシュボード</title>
<style>
  :root{
    --bg:#0d0b12; --panel:#161320; --line:#2c2740; --ink:#e8e2d0; --dim:#9a927f;
    --gold:#c9a24a; --goldb:#e8c877; --win:#7dc99a; --lose:#d97a86; --draw:#8a8496;
    --moon:#8fa9c9; --sun:#e0a23d; --dark:#8a5cae; --kaos:#c14b52; --air:#6fbfa0;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Hiragino Kaku Gothic ProN',sans-serif; font-size:14px; }
  h1{ font-size:20px; margin:0; letter-spacing:0.04em; }
  h2{ font-size:14px; color:var(--gold); margin:0 0 10px; font-weight:600; letter-spacing:0.03em; }
  h3{ font-size:12px; color:var(--dim); margin:0 0 8px; font-weight:600; }
  a{ color:var(--goldb); }
  code{ background:#0a0810; padding:1px 5px; border-radius:4px; font-size:12px; }

  /* ゲート */
  #gate{ min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:24px; }
  #gate .box{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:28px 24px; max-width:360px; width:100%; text-align:center; }
  #gate input{ width:100%; padding:11px 12px; margin-top:14px; background:#0a0810; border:1px solid var(--line); border-radius:9px; color:var(--ink); font-size:15px; }
  #gate .err{ color:var(--lose); font-size:12px; min-height:16px; margin-top:8px; }
  .btn{ display:inline-block; background:linear-gradient(180deg,#2a2540,#1c1830); border:1px solid var(--line); color:var(--ink);
    padding:9px 18px; border-radius:9px; cursor:pointer; font-size:13px; user-select:none; }
  .btn:hover{ border-color:var(--gold); }
  .btn.primary{ background:linear-gradient(180deg,#7a5f22,#5c4718); border-color:var(--gold); color:#fff; }

  /* ダッシュボード */
  #dash{ display:none; max-width:1000px; margin:0 auto; padding:18px 16px 60px; }
  header.top{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
  header.top .sp{ flex:1; }
  #envBadge{ font-size:11px; padding:2px 9px; border-radius:999px; border:1px solid; font-weight:600; letter-spacing:.05em; }
  #envBadge.dev{ color:#e8c877; border-color:#e8c877; background:rgba(232,200,119,.12); }
  .muted{ color:var(--dim); font-size:12px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin:14px 0; }
  .kpi{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; }
  .kpi .v{ font-size:26px; font-weight:700; color:var(--goldb); }
  .kpi .l{ font-size:11px; color:var(--dim); margin-top:3px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:12px; }
  .cols{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:640px){ .cols{ grid-template-columns:1fr; } }

  .bar-row{ display:flex; align-items:center; gap:8px; margin:5px 0; font-size:12px; }
  .bar-label{ width:120px; flex-shrink:0; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .bar-track{ flex:1; height:14px; background:#0a0810; border-radius:7px; overflow:hidden; }
  .bar-fill{ height:100%; background:linear-gradient(90deg,var(--gold),var(--goldb)); border-radius:7px; }
  .bar-val{ width:96px; flex-shrink:0; text-align:right; color:var(--dim); font-variant-numeric:tabular-nums; }
  .a-moon{ background:var(--moon)!important; } .a-sun{ background:var(--sun)!important; }
  .a-dark{ background:var(--dark)!important; } .a-kaos{ background:var(--kaos)!important; } .a-air{ background:var(--air)!important; }

  table{ width:100%; border-collapse:collapse; font-size:12px; }
  th,td{ padding:6px 8px; border-bottom:1px solid var(--line); text-align:left; white-space:nowrap; }
  th{ color:var(--dim); font-weight:600; cursor:pointer; user-select:none; position:sticky; top:0; background:var(--panel); }
  th:hover{ color:var(--gold); }
  tr.row{ cursor:pointer; }
  tr.row:hover td{ background:#1c1830; }
  .tag{ padding:1px 7px; border-radius:6px; font-size:11px; border:1px solid; }
  .tag.win{ color:var(--win); border-color:var(--win); }
  .tag.lose{ color:var(--lose); border-color:var(--lose); }
  .tag.draw{ color:var(--draw); border-color:var(--draw); }
  .tbl-wrap{ max-height:440px; overflow:auto; border:1px solid var(--line); border-radius:10px; }
  .filters{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
  .filters select,.filters input{ background:#0a0810; border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:6px 9px; font-size:12px; }

  /* 詳細モーダル */
  .modal{ position:fixed; inset:0; background:rgba(6,5,9,0.85); display:none; align-items:center; justify-content:center; padding:18px; z-index:50; }
  .modal.show{ display:flex; }
  .modal .inner{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px; max-width:520px; width:100%; max-height:86vh; overflow:auto; }
  .rrow{ border:1px solid var(--line); border-radius:8px; padding:6px 9px; margin-bottom:5px; font-size:12px; }
  .rrow .rt{ display:flex; justify-content:space-between; color:var(--dim); font-size:10px; }
  .ctag{ padding:1px 6px; border-radius:5px; border:1px solid; font-size:11px; }
  .c-moon{ color:var(--moon); border-color:var(--moon); } .c-sun{ color:var(--sun); border-color:var(--sun); }
  .c-dark{ color:var(--dark); border-color:var(--dark); } .c-kaos{ color:var(--kaos); border-color:var(--kaos); } .c-air{ color:var(--air); border-color:var(--air); }
  .banner{ background:#3a1518; border:1px solid var(--lose); color:#f0c0c4; padding:12px 14px; border-radius:10px; font-size:12px; line-height:1.7; }
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <h1>MASKD 管理ダッシュボード</h1>
    <p class="muted" style="margin-top:10px;">パスフレーズを入力してください</p>
    <input id="pass" type="password" placeholder="パスフレーズ" autocomplete="off">
    <div class="err" id="gateErr"></div>
    <div class="btn primary" id="unlockBtn" style="margin-top:10px;width:100%;">開く</div>
    <p class="muted" style="margin-top:14px;font-size:10px;line-height:1.6;">
      ※このゲートは目隠しであり、真のセキュリティではありません。データは匿名です。
    </p>
  </div>
</div>

<div id="dash">
  <header class="top">
    <h1>MASKD ダッシュボード</h1>
    <span id="envBadge"></span>
    <span class="sp"></span>
    <span class="btn" id="showHiddenBtn">非表示も表示</span>
    <span class="btn" id="reloadBtn">再読み込み</span>
    <span class="btn" id="csvBtn">CSV</span>
    <span class="btn" id="jsonBtn">JSON</span>
    <span class="btn" id="lockBtn">ロック</span>
  </header>
  <div class="muted" id="meta"></div>
  <div id="content"><p class="muted" style="margin-top:20px;">読み込み中…</p></div>
</div>

<div class="modal" id="detailModal"><div class="inner" id="detailInner"></div></div>

<script type="module">

const ATTRS=['moon','sun','dark','kaos','air'];

// v1.0.0より前の変更履歴アーカイブ(v0.1.0〜v0.61.3)。
// v1.0.0のフリーズ宣言に伴い、ゲーム本体(index.html)のお知らせベルからは撤去し、

const PRE_V1_CHANGELOG = [
  { version:'v0.61.3', date:'2026-07-18', items:[
    '<b>ラウンド結果画面のレイアウト崩れを修正</b>：結果カードの背景が半透明すぎたため、ヒント表示ONの状態だと縁のあたりに背後のスコア表示などが透けて見えてしまう不具合を修正（背景をほぼ不透明に変更）。',

  { version:'v0.61.2', date:'2026-07-17', items:[
    '<b>離脱率などの分析イベントが保存されない不具合を修正</b>：セッション開始・対戦開始・離脱・チュートリアル完走の記録が、Firestoreのルールと噛み合っておらずこれまで保存できていなかった問題を修正。管理画面(admin.html)に離脱率・チュートリアル完走率の表示を追加（見た目の変化なし・裏側の不具合修正＋管理画面の機能追加）。',
  ]},
  { version:'v0.61.1', date:'2026-07-17', items:[

  ]},
  { version:'v0.61.0', date:'2026-07-17', items:[
    '<b>管理画面に論理削除(非表示)機能を追加</b>：対戦ログ・アンケート回答・登録プレイヤーのそれぞれを、管理画面(admin.html)から「非表示」にできるように（テストデータや荒らし投稿などを集計・一覧から除外する用途）。データ自体は消さず「非表示イベント」を記録するだけなので、いつでも「元に戻す」で復元できる。',

  { version:'v0.60.1', date:'2026-07-17', items:[

  ]},
  { version:'v0.60.0', date:'2026-07-17', items:[
    '<b>初級・中級・上級もプレイ記録の対象に</b>：これまでプレイ記録（ホームの戦績バッジ・実績の一部条件）は「本戦」のみが対象だったが、練習モード（初級／中級／上級）で遊んだ分も同じ記録に加わるように変更。',
    '<b>ホームの戦績バッジの表記を変更</b>：「勝率XX%」のみの表示から、「X勝（勝率XX%）」に変更し勝ち数も一目で分かるように。',
    '<b>プレイヤー登録人数を管理画面に追加</b>：設定画面で名前を登録した人数を管理画面(admin.html)で確認できるように。登録があるとプッシュ通知が届く（アンケート回答の通知と同じ仕組み）。',
    '<b>ホーム画面のメニュー並び替え</b>：「遊び方／ルール／実績」「ミッション／ランク／戦績」の順に整理（初見の人が迷わないよう、遊ぶ前に必要な情報を上段に）。',

  ]},
  { version:'v0.59.4', date:'2026-07-17', items:[

  { version:'v0.59.2', date:'2026-07-17', items:[

  ]},
  { version:'v0.59.1', date:'2026-07-17', items:[
    '<b>アンケート機能を追加</b>：設定画面から「📝 アンケートに回答する」で、面白さ（5段階）・またやりたいか・自由記述の3項目に回答できるように。匿名でクラウドに保存され、開発側で確認できる。',
  ]},
  { version:'v0.59.0', date:'2026-07-17', items:[
    '<b>対戦設定画面のレベル選択を4択に統合</b>：「初級／中級／上級」＋別立てだった「アクション設定（基本／フル）」を、「初級／中級／上級／本戦」の1つの選択に統合。「本戦」を選ぶと上級のルール＋入替・奇襲などフル機能＋成績記録が一括で有効になる（以前は「上級」を選んだ上でさらに下の方にある「アクション設定」を「フル」にしないと本戦にならず、分かりにくかった）。あわせて、初回訪問者には出番のない「🔰初心者ではじめる」ボタンを削除（初回訪問時はこの画面自体を経由せず自動で初級に入るため、実質的に重複した導線だった）。',

// 時系列に並べて「最後のイベント」を現在の状態とみなす(追記のみ・更新削除なしの設計に合わせるため)。

const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const tsMillis=e=>{ try{ return e && e.ts && e.ts.toDate ? e.ts.toDate().getTime() : 0; }catch(err){ return 0; } };
// 日時表示は全て日本時間(JST)に統一する。Firestoreのタイムスタンプ・クライアント側ISO文字列(UTC)
// のどちらもDate化してここを通すことで、投稿・来訪の実時刻を直感的に突き合わせられるようにする。
const JST_OPTS={ timeZone:'Asia/Tokyo', year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false };
function fmtJST(d, withSeconds){
  try{
    const opts=withSeconds?{...JST_OPTS, second:'2-digit'}:JST_OPTS;
    return new Intl.DateTimeFormat('sv-SE', opts).format(d);
  }catch(e){ return ''; }
}
function jstDay(d){ try{ return new Intl.DateTimeFormat('sv-SE', {timeZone:'Asia/Tokyo', year:'numeric', month:'2-digit', day:'2-digit'}).format(d); }catch(e){ return ''; } }
function jstFromIso(iso, withSeconds){ if(!iso) return ''; const d=new Date(iso); return isNaN(d)?'':fmtJST(d, withSeconds); }
function jstFromTimestamp(ts, withSeconds){ try{ return ts && ts.toDate ? fmtJST(ts.toDate(), withSeconds) : ''; }catch(e){ return ''; } }
function isHidden(col,id){ return !!(id && hiddenMap[col+'|'+id]); }
// logsコレクションには「完了した対戦の記録」(type:'game'、v0.55より前はtype自体が無い)と、
// v0.55.0で追加された「分析用の軽量イベント」(session_start/game_start/abandon/tutorial_*)が混在する。
// 後者はwinner/playerFinal/cpuFinalを持たないため、勝敗集計などに混ぜるとおかしな値になる。
function isGameRecord(g){ return !g.type || g.type==='game'; }
function visibleLogs(){ return allLogs.filter(g=>isGameRecord(g) && !isHidden('logs', g._id)); }
async function toggleHidden(col,id,hide){
  if(hide && !confirm('この項目を非表示にしますか？(集計・一覧から除外されます。いつでも元に戻せます)')) return;
  if(!fb || !fb.addDoc){ alert('この操作にはFirebase接続が必要です。'); return; }
  try{
    await fb.addDoc(fb.collection(fb.db,envCol('hidden_records')), { col, docId:id, action:(hide?'hide':'unhide'), ts:fb.serverTimestamp() });
    hiddenMap[col+'|'+id]=hide;
    render();
  }catch(e){
    const code=(e&&(e.code||e.message))||'不明なエラー';
    alert('操作に失敗しました。Firestoreのセキュリティルールで '+envCol('hidden_records')+' の書き込みを許可してください。\n'+code);
  }
}
function hideBtnHTML(col,id){
  if(!id) return '';
  const hidden=isHidden(col,id);
  return `<span class="btn hidebtn" style="padding:2px 8px;font-size:10px;" data-col="${esc(col)}" data-id="${esc(id)}" data-hide="${hidden?'0':'1'}">${hidden?'元に戻す':'非表示'}</span>`;
}
function bindHideButtons(){
  document.querySelectorAll('.hidebtn').forEach(el=>{
    el.onclick=(ev)=>{
      ev.stopPropagation();

  });
}

async function sha256hex(str){
  const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ===== ゲート =====
async function tryUnlock(){
  const v=$('pass').value;
  const h=await sha256hex(v);
  if(h===PASS_SHA256){
    try{ sessionStorage.setItem(UNLOCK_KEY,'1'); }catch(e){}
    showDash();
  } else {
    $('gateErr').textContent='パスフレーズが違います';
  }
}
function lock(){ try{ sessionStorage.removeItem(UNLOCK_KEY); }catch(e){} location.reload(); }
// URLに ?pass=合言葉 が付いていれば自動で解錠する(通知リンクからワンタップで開けるように)。
// 一致したらURLからパスフレーズを消してブラウザ履歴に残らないようにする。
async function tryAutoUnlockFromURL(){
  try{
    const p=new URLSearchParams(location.search).get('pass');
    if(!p) return false;
    const h=await sha256hex(p);
    if(h!==PASS_SHA256) return false;
    try{ sessionStorage.setItem(UNLOCK_KEY,'1'); }catch(e){}
    try{ const u=new URL(location.href); u.searchParams.delete('pass'); history.replaceState(null,'',u.toString()); }catch(e){}
    return true;
  }catch(e){ return false; }
}
function showDash(){
  $('gate').style.display='none';
  $('dash').style.display='block';
  init();
}

// ===== データ取得 =====
async function init(){
  if(!fb){
    $('content').innerHTML='<p class="muted" style="margin-top:20px;">Firebaseを読み込み中…</p>';
    try{
      const appMod=await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js");
      const fsMod=await import("https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js");
      const app=appMod.initializeApp(firebaseConfig);
      fb={ db:fsMod.getFirestore(app), collection:fsMod.collection, getDocs:fsMod.getDocs,
        query:fsMod.query, limit:fsMod.limit, getCountFromServer:fsMod.getCountFromServer,
        addDoc:fsMod.addDoc, serverTimestamp:fsMod.serverTimestamp };
    }catch(e){ $('content').innerHTML=banner('Firebaseの読み込みに失敗しました（ネットワーク/CDN）。<br><span style="font-size:10px;">'+esc(e&&e.message)+'</span>'); return; }
  }
  await loadData();
}
async function loadData(){
  if(!fb){ return init(); }
  $('content').innerHTML='<p class="muted" style="margin-top:20px;">クラウドから読み込み中…</p>';
  try{
    const [snap, count] = await Promise.all([
      fb.getDocs(fb.query(fb.collection(fb.db,envCol("logs")), fb.limit(5000))),
      fb.getCountFromServer(fb.collection(fb.db,envCol("logs"))).then(s=>s.data().count).catch(()=>null)
    ]);
    allLogs=[]; snap.forEach(d=>allLogs.push({...d.data(), _id:d.id}));
    totalCount=count;
  }catch(e){
    const code=(e&&(e.code||e.message))||'';
    $('content').innerHTML=banner(
      'クラウドからの読み取りに失敗しました。<br>Firestoreのセキュリティルールで <code>'+esc(envCol("logs"))+'</code> の<b>読み取り</b>を許可してください：<br>'+
      '<code>match /'+esc(envCol("logs"))+'/{doc} { allow create: if true; allow read: if true; }</code><br>'+
      '<span style="font-size:10px;">詳細: '+esc(code)+'</span>');
    return;
  }
  // アンケートは失敗してもダッシュボード全体は表示する(独立して扱う)
  try{
    const snap=await fb.getDocs(fb.query(fb.collection(fb.db,envCol("surveys")), fb.limit(2000)));
    allSurveys=[]; snap.forEach(d=>allSurveys.push({...d.data(), _id:d.id}));
    surveyLoadError=null;
  }catch(e){
    allSurveys=[]; surveyLoadError=(e&&(e.code||e.message))||'不明なエラー';
  }
  // 登録プレイヤー数(件数はサーバー集計、一覧は直近分のみ取得)
  try{
    const [snap, count] = await Promise.all([
      fb.getDocs(fb.query(fb.collection(fb.db,envCol("players")), fb.limit(300))),
      fb.getCountFromServer(fb.collection(fb.db,envCol("players"))).then(s=>s.data().count).catch(()=>null)
    ]);
    allPlayers=[]; snap.forEach(d=>allPlayers.push({...d.data(), _id:d.id}));
    totalPlayers=count;
    playerLoadError=null;
  }catch(e){
    allPlayers=[]; totalPlayers=null; playerLoadError=(e&&(e.code||e.message))||'不明なエラー';
  }
  // 匿名の来訪カウント(同意不要)。総数はサーバー側集計、日時を見るため直近分の実データも取得。
  try{
    const [snap, count] = await Promise.all([
      fb.getDocs(fb.query(fb.collection(fb.db,envCol("visits")), fb.limit(2000))),
      fb.getCountFromServer(fb.collection(fb.db,envCol("visits"))).then(s=>s.data().count).catch(()=>null)
    ]);
    allVisits=[]; snap.forEach(d=>allVisits.push(d.data()));
    totalVisits=count;
  }catch(e){ allVisits=[]; totalVisits=null; }
  // 論理削除(非表示)イベント。読めなくても他機能は継続(何も非表示にしない扱い)。
  try{
    const snap=await fb.getDocs(fb.query(fb.collection(fb.db,envCol('hidden_records')), fb.limit(5000)));
    const events=[]; snap.forEach(d=>events.push(d.data()));
    events.sort((a,b)=>tsMillis(a)-tsMillis(b));
    hiddenMap={};
    events.forEach(e=>{ if(e && e.col && e.docId) hiddenMap[e.col+'|'+e.docId]=(e.action==='hide'); });
  }catch(e){ hiddenMap={}; }
  render();
}
function banner(html){ return '<div class="banner">'+html+'</div>'; }

// ===== アンケート =====
function surveySectionHTML(){
  if(surveyLoadError){
    return '<h2>📝 アンケート回答</h2>'+banner(
      'アンケート(<code>'+esc(envCol('surveys'))+'</code>コレクション)の読み取りに失敗しました。<br>Firestoreのセキュリティルールで<b>読み取り</b>を許可してください：<br>'+
      '<code>match /'+esc(envCol('surveys'))+'/{doc} { allow create: if true; allow read: if true; }</code><br>'+
      '<span style="font-size:10px;">詳細: '+esc(surveyLoadError)+'</span>');
  }
  const visible=allSurveys.filter(x=>!isHidden('surveys',x._id));
  const hiddenCount=allSurveys.length-visible.length;
  const N=visible.length;
  let out='<h2>📝 アンケート回答</h2>';
  if(hiddenCount) out+=`<div class="muted" style="font-size:11px;margin:0 0 8px;">（非表示 ${hiddenCount}件。集計からは除外されています）</div>`;
  const list=showHidden?allSurveys:visible;
  if(!N && !list.length) return out+'<div class="card muted">まだ回答がありません。</div>';
  const avgFun=N?(visible.reduce((s,x)=>s+(Number(x.fun)||0),0)/N).toFixed(1):'-';
  const replayLabel={yes:'ぜひ',maybe:'たぶん',no:'あまり'};
  const replayCount={yes:0,maybe:0,no:0};
  visible.forEach(x=>{ if(replayCount[x.replay]!=null) replayCount[x.replay]++; });
  out+=`<div class="grid">
    ${kpi(N,'回答数')}
    ${kpi(avgFun,'平均の面白さ(5点満点)')}
    ${kpi(`${replayCount.yes}/${replayCount.maybe}/${replayCount.no}`,'またやりたい(ぜひ/たぶん/あまり)')}
  </div>`;
  if(!list.length) return out;
  const sorted=[...list].sort((a,b)=>String(b.ts||'').localeCompare(String(a.ts||'')));
  out+='<div class="card"><div class="tbl-wrap" style="max-height:320px;">'+
    sorted.map(x=>{
      const t=jstFromIso(x.ts, false);
      const hidden=isHidden('surveys',x._id);
      return `<div class="rrow"${hidden?' style="opacity:.55;"':''}>
        <div class="rt"><span>⭐${esc(x.fun)} ／ またやりたい: ${esc(replayLabel[x.replay]||'-')} ／ ${esc(x.version||'')}${hidden?' <span class="muted">(非表示中)</span>':''}</span><span>${esc(t)} ${hideBtnHTML('surveys',x._id)}</span></div>
        ${x.comment?`<div style="margin-top:4px;">${esc(x.comment)}</div>`:''}
      </div>`;
    }).join('')+
    '</div></div>';
  return out;
}

  const list=showHidden?allPlayers:visible;
  if(!list.length) return out+'<div class="card muted">まだ登録がありません。</div>';
  // プレイ数はlogsのplayerId(無ければ名前)で突き合わせた概算値(非表示にしたログは除く)。
  // playerIdは端末ローカルのIDなので、同じ人が端末を変えると別カウントになる。
  // playerIdが無い古い登録データは名前一致で数えるため、同名の別人がいる場合は不正確になりうる。
  const playCountFor=x=>{
    const logs=visibleLogs();
    if(x.playerId) return logs.filter(g=>g.playerId===x.playerId).length;
    if(!x.name) return 0;
    return logs.filter(g=>g.playerName===x.name).length;
  };
  // チュートリアル(段階式LEARN_STAGES)の進行度: learn_stage_clearイベントのplayerId突き合わせで、
  // クリア済みの最大ステージ番号を出す(playerIdが無い古い登録は対象外＝概算すらできないため空欄)。
  const learnProgressFor=x=>{
    if(!x.playerId) return null;
    const events=allLogs.filter(g=>g.type==='learn_stage_clear' && g.playerId===x.playerId && !isHidden('logs', g._id));
    if(!events.length) return null;
    const stage=Math.max(...events.map(g=>g.stage||0));
    const total=events.find(g=>g.totalStages)?.totalStages || 7;
    return { stage, total };
  };
  const tsOf=x=>{ try{ return x.serverTs && x.serverTs.toDate ? x.serverTs.toDate().getTime() : 0; }catch(e){ return 0; } };
  const sorted=[...list].sort((a,b)=>tsOf(b)-tsOf(a));
  out+='<div class="card"><div class="tbl-wrap" style="max-height:280px;">'+
    sorted.slice(0,50).map(x=>{
      const t=jstFromTimestamp(x.serverTs, false);
      const pc=playCountFor(x);
      const lp=learnProgressFor(x);
      const lpHTML = lp ? ` <span style="color:${lp.stage>=lp.total?'var(--win, #7bd88f)':'var(--goldb)'}">・チュート${lp.stage}/${lp.total}</span>` : '';
      const hidden=isHidden('players',x._id);
      return `<div class="rrow"${hidden?' style="opacity:.55;"':''}><div class="rt"><span>${esc(x.name||'(名前なし)')} <span style="color:var(--goldb)">・${pc}戦</span>${lpHTML}${hidden?' <span class="muted">(非表示中)</span>':''}</span><span>${esc(t)} ${hideBtnHTML('players',x._id)}</span></div></div>`;
    }).join('')+
    '</div></div>'+
    '<div class="muted" style="font-size:10px;margin-top:4px;">※プレイ数は対戦ログとの突き合わせによる概算です（新規登録分は端末IDで正確に突き合わせ、それ以前の登録は名前一致のため同名の別人がいると誤差が出ます）。チュート進行度は「learn_stage_clear」計測イベントに基づくため、v1.14.0以降にクリアしたステージのみ反映されます。</div>';
  return out;
}

// ===== 匿名の来訪カウント(同意不要・playerId等の識別子なし) =====
function visitsSectionHTML(){
  if(!allVisits.length){
    return '<div class="muted" style="font-size:11px;margin:-4px 0 12px;">※来訪記録はまだありません(Firestoreルール反映前、または反映直後でまだ収集中の可能性があります)。</div>';
  }
  const tsOf=x=>{ try{ return x.serverTs && x.serverTs.toDate ? x.serverTs.toDate().getTime() : 0; }catch(e){ return 0; } };
  const sorted=[...allVisits].sort((a,b)=>tsOf(b)-tsOf(a));
  const days={};
  sorted.forEach(x=>{ const t=tsOf(x); if(!t) return; const day=jstDay(new Date(t)); if(day) days[day]=(days[day]||0)+1; });
  const dayKeys=Object.keys(days).sort();
  let out='<h2>🚪 来訪履歴（同意不要・全訪問・日本時間）</h2>';
  out+='<div class="card">'+bars(dayKeys.map(d=>({label:d,value:days[d],sub:String(days[d])})))+'</div>';
  out+='<div class="card" style="margin-top:8px;"><h3>直近の来訪</h3><div class="tbl-wrap" style="max-height:220px;">'+
    sorted.slice(0,50).map(x=>{
      const t=jstFromTimestamp(x.serverTs, true);
      return `<div class="rrow"><div class="rt"><span>${esc(t||'（時刻不明）')}</span></div></div>`;
    }).join('')+
    '</div></div>';
  return out;
}

// ===== 軽量イベント(離脱率・チュートリアル完走率) =====
// v0.55.0で追加されたが、Firestoreルールがwinner等を必須にしていたため実際には
// これまで一件も保存できていなかった不具合をv0.61.2で修正。ルール反映前のデータには
// 出てこないため、件数が0の間はセクション自体を出さない。
//
// セッション開始/対戦開始の計測が同意タイミングの問題でほぼ0件のまま溜まっており、
// 全期間の集計だけだと見づらいという指摘を受け、v1.20.0で「リセット基準日時」を追加。
// 実データ(Firestore)は一切変更・削除せず、admin.htmlのブラウザ内(localStorage)に
// 基準時刻を保存し、それ以降のイベントだけを別カードとして並べて見せる。
const EVRESET_KEY = 'maskd_admin_evreset_ts' + (isDevPreview ? '_dev' : '');
function getEventResetTs(){ try{ return localStorage.getItem(EVRESET_KEY); }catch(e){ return null; } }
function setEventResetTs(iso){ try{ localStorage.setItem(EVRESET_KEY, iso); }catch(e){} }
function clearEventResetTs(){ try{ localStorage.removeItem(EVRESET_KEY); }catch(e){} }
function evMillis(e){
  try{
    if(e.serverTs && e.serverTs.toDate) return e.serverTs.toDate().getTime();
    if(e.ts){ const d=new Date(e.ts); if(!isNaN(d)) return d.getTime(); }
  }catch(err){}
  return 0;
}
function eventCountsCardHTML(logs, title){
  const evCount={}; logs.forEach(g=>{ evCount[g.type]=(evCount[g.type]||0)+1; });
  const gameStart=evCount.game_start||0, abandon=evCount.abandon||0;
  const tutStart=evCount.tutorial_start||0, tutComplete=evCount.tutorial_complete||0;
  const abandonRate=gameStart?(abandon/gameStart*100):null;
  const tutRate=tutStart?(tutComplete/tutStart*100):null;
  let out=`<div class="cols">`;
  out+=`<div class="card"><h3>${esc(title)}</h3>`+bars([
    {label:'セッション開始',value:evCount.session_start||0,sub:String(evCount.session_start||0)},
    {label:'対戦開始',value:gameStart,sub:String(gameStart)},
    {label:'離脱(対戦中断)',value:abandon,sub:String(abandon)},
    {label:'チュートリアル開始',value:tutStart,sub:String(tutStart)},
    {label:'チュートリアル完走',value:tutComplete,sub:String(tutComplete)},
  ])+`</div>`;
  out+=`<div class="card"><h3>離脱率・完走率</h3>`+bars([
    {label:'離脱率',value:abandonRate||0,sub:abandonRate!=null?abandonRate.toFixed(1)+'%':'データ不足'},
    {label:'チュート完走率',value:tutRate||0,sub:tutRate!=null?tutRate.toFixed(1)+'%':'データ不足'},
  ])+`<div class="muted" style="font-size:10px;margin-top:4px;">離脱率＝離脱数/対戦開始数、チュート完走率＝チュートリアル完走数/開始数</div></div>`;
  out+=`</div>`;
  return out;
}
function eventResetCtrlHTML(){
  const resetTs=getEventResetTs();
  const resetLabel=resetTs?jstFromIso(resetTs, true):null;
  return `<div class="muted" style="font-size:11px;margin:-2px 0 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    ${resetLabel?`<span>🔄 リセット基準: <b style="color:var(--goldb)">${esc(resetLabel)}</b>（日本時間）</span><span class="btn evreset-clear" style="padding:2px 8px;font-size:10px;">解除</span>`:''}
    <span class="btn evreset-set" style="padding:2px 8px;font-size:10px;">${resetLabel?'今からに更新':'ここからリセット'}</span>
  </div>`;
}
function bindEventResetButtons(){
  document.querySelectorAll('.evreset-set').forEach(el=>{ el.onclick=()=>{ setEventResetTs(new Date().toISOString()); render(); }; });
  document.querySelectorAll('.evreset-clear').forEach(el=>{ el.onclick=()=>{ clearEventResetTs(); render(); }; });
}
function eventStatsHTML(eventLogs){
  const ctrl=eventResetCtrlHTML();
  if(!eventLogs.length){
    return '<h2>計測イベント（離脱・チュートリアル完走）</h2>'+ctrl+'<div class="muted" style="font-size:11px;margin:-4px 0 12px;">※離脱率などの計測イベントはまだ0件です(Firestoreルール反映前のデータのため、または反映直後でまだ収集中の可能性があります)。</div>';
  }
  let out='<h2>計測イベント（離脱・チュートリアル完走）</h2>'+ctrl;
  out+=eventCountsCardHTML(eventLogs, 'イベント件数（全期間）');
  const resetTs=getEventResetTs();
  if(resetTs){
    const baseMs=new Date(resetTs).getTime();
    const filtered=eventLogs.filter(g=>evMillis(g)>=baseMs);
    out+=`<div class="muted" style="font-size:11px;margin:10px 0 4px;">🔄 リセット後（${esc(jstFromIso(resetTs, true))}〜・日本時間）のみの集計</div>`;
    out+=filtered.length?eventCountsCardHTML(filtered, 'イベント件数（リセット後）'):'<div class="muted" style="font-size:11px;">リセット後のイベントはまだありません。</div>';
  }
  return out;
}

// ===== 集計＆描画 =====
function render(){
  const gameLogsAll=allLogs.filter(isGameRecord);
  const eventLogs=allLogs.filter(g=>!isGameRecord(g));
  const lVisible=visibleLogs();
  const N=lVisible.length;
  const hiddenLogCount=gameLogsAll.length-N;
  const total=(totalCount!=null)?totalCount:allLogs.length;
  const sampled=(totalCount!=null && totalCount>allLogs.length);
  $('meta').innerHTML=`総レコード数(サーバー集計・対戦+計測イベント): <b style="color:var(--goldb)">${total}</b> 件`+
    (sampled?`　／　集計は直近 ${allLogs.length} 件のサンプル`:``)+
    `　／　取得 ${allLogs.length} 件(対戦${gameLogsAll.length}・イベント${eventLogs.length})`+
    (hiddenLogCount?`　／　非表示 <b style="color:var(--goldb)">${hiddenLogCount}</b> 件(集計から除外)`:``);

  if(!N){ $('content').innerHTML=surveySectionHTML()+playersSectionHTML()+visitsSectionHTML()+eventStatsHTML(eventLogs)+banner('対戦ログのデータはまだありません。')+preV1ChangelogHTML(); bindHideButtons(); bindEventResetButtons(); return; }

  // 基本集計
  let pw=0,cw=0,dr=0,sumP=0,sumC=0,sumTime=0,timeCount=0;
  const players=new Set(), days={}, diffAgg={}, typeAgg={}, verAgg={};
  const marginBins={}, scoreBins={};
  let fdWon=0, fdDecided=0;               // 先手(第1親)勝率
  let rDealer=0,rChild=0,rDraw=0,rPass=0; // ラウンド結果
  const attrPlay={}, attrWin={};          // 属性ごとの出現/勝利
  ATTRS.forEach(a=>{attrPlay[a]=0;attrWin[a]=0;});

  lVisible.forEach(g=>{
    if(g.winner==='player')pw++; else if(g.winner==='cpu')cw++; else dr++;
    sumP+=(g.playerFinal||0); sumC+=(g.cpuFinal||0);
    if(typeof g.playTimeMs==='number'){ sumTime+=g.playTimeMs; timeCount++; }
    if(g.playerId) players.add(g.playerId);
    const day=g.ts?jstDay(new Date(g.ts)):''; if(day) days[day]=(days[day]||0)+1;
    agg(diffAgg, g.cpuDifficulty, g.winner);
    agg(typeAgg, g.cpuStrategy, g.winner);
    agg(verAgg, g.version, g.winner);
    const m=Math.abs((g.playerFinal||0)-(g.cpuFinal||0)); const mb=Math.min(5,Math.floor(m/5))*5; marginBins[mb]=(marginBins[mb]||0)+1;
    const sb=Math.min(11,Math.floor((g.playerFinal||0)/10))*10; scoreBins[sb]=(scoreBins[sb]||0)+1;
    const log=Array.isArray(g.log)?g.log:[];
    if(log.length && g.winner!=='draw'){
      const firstDealerIsPlayer=!!log[0].dealerIsYou;
      const fdWinner=firstDealerIsPlayer?'player':'cpu';
      fdDecided++; if(g.winner===fdWinner) fdWon++;
    }
    log.forEach(r=>{
      if(r.passed){ rPass++; }
      else if(r.result==='draw'){ rDraw++; }
      else if(r.result==='dealer'){ rDealer++; }
      else if(r.result==='child'){ rChild++; }
      [r.dealerCard,r.childCard].forEach((c,i)=>{
        if(!c||!c.attr)return; attrPlay[c.attr]=(attrPlay[c.attr]||0)+1;
        const isDealer=(i===0);
        const won=(!r.passed)&&((isDealer&&r.result==='dealer')||(!isDealer&&r.result==='child'));
        if(won) attrWin[c.attr]=(attrWin[c.attr]||0)+1;
      });
    });
  });
  const decided=pw+cw;
  const avgTime=timeCount?(sumTime/timeCount/1000):null;

  // アンケート・登録プレイヤー(最優先で確認したい項目なので一番上に表示)
  let html=surveySectionHTML()+playersSectionHTML();

  // KPI
  html+=`<div class="grid">
    ${kpi(totalVisits!=null?totalVisits:'-','来訪数(同意不要・全訪問)')}
    ${kpi(total,'総レコード数')}
    ${kpi(players.size,'参加プレイヤー数')}
    ${kpi(pctOf(pw,decided),'プレイヤー勝率')}
    ${kpi(pctOf(fdWon,fdDecided),'先手(第1親)勝率')}
    ${kpi((sumP/N).toFixed(1)+' / '+(sumC/N).toFixed(1),'平均スコア P/C')}
    ${kpi(avgTime!=null?avgTime.toFixed(0)+'秒':'-','平均対戦時間')}
  </div>`;

  html+=visitsSectionHTML();
  html+=eventStatsHTML(eventLogs);

  // バランス分析
  html+=`<h2>バランス分析</h2><div class="cols">`;
  html+=`<div class="card"><h3>勝敗の内訳</h3>`+bars([
    {label:'プレイヤー勝ち',value:pw,sub:`${pw} (${pctOf(pw,N)})`},
    {label:'CPU勝ち',value:cw,sub:`${cw} (${pctOf(cw,N)})`},
    {label:'引き分け',value:dr,sub:`${dr} (${pctOf(dr,N)})`},
  ])+`</div>`;
  html+=`<div class="card"><h3>難易度別 プレイヤー勝率</h3>`+aggBars(diffAgg,DIFF)+`</div>`;
  html+=`<div class="card"><h3>CPU性格別 プレイヤー勝率</h3>`+aggBars(typeAgg,TYPE)+`</div>`;
  html+=`<div class="card"><h3>バージョン別 プレイヤー勝率</h3>`+aggBars(verAgg,{})+`</div>`;
  html+=`<div class="card"><h3>ラウンド結果の内訳</h3>`+bars([
    {label:'親の勝ち',value:rDealer,sub:`${rDealer} (${pctOf(rDealer,rDealer+rChild+rDraw+rPass)})`},
    {label:'子の勝ち',value:rChild,sub:`${rChild} (${pctOf(rChild,rDealer+rChild+rDraw+rPass)})`},
    {label:'引き分け',value:rDraw,sub:`${rDraw}`},
    {label:'撤退',value:rPass,sub:`${rPass}`},
  ])+`</div>`;
  html+=`<div class="card"><h3>属性別 出現数と決戦勝率</h3>`+bars(ATTRS.map(a=>({
    label:AJP[a], value:attrPlay[a], cls:'a-'+a, sub:`出${attrPlay[a]} / 勝率${pctOf(attrWin[a],attrPlay[a])}`
  })))+`</div>`;
  html+=`<div class="card"><h3>最終スコア差の分布</h3>`+binBars(marginBins,'差')+`</div>`;
  html+=`<div class="card"><h3>プレイヤー最終スコアの分布</h3>`+binBars(scoreBins,'pt')+`</div>`;
  html+=`</div>`;

  // 日別
  const dayKeys=Object.keys(days).sort();
  html+=`<h2>日別プレイ数（日本時間）</h2><div class="card">`+bars(dayKeys.map(d=>({label:d,value:days[d],sub:String(days[d])})))+`</div>`;

  // 生データ
  html+=`<h2>生データ（対戦ログ）</h2>`+tableUI();

  // v1.0.0より前の変更履歴アーカイブ(開発者向け、既定は折りたたみ)
  html+=preV1ChangelogHTML();

  $('content').innerHTML=html;
  bindTable();
  bindEventResetButtons();
}
function preV1ChangelogHTML(){
  const rows=PRE_V1_CHANGELOG.map(entry=>`
    <div class="rrow">
      <div class="rt"><span style="color:var(--goldb);font-weight:600;">${esc(entry.version)}</span><span>${esc(entry.date)}</span></div>
      <ul style="margin:4px 0 0;padding-left:16px;font-size:11px;color:var(--dim);line-height:1.6;">
        ${entry.items.map(i=>`<li>${i}</li>`).join('')}
      </ul>
    </div>`).join('');
  return `<h2>📜 開発履歴アーカイブ（v1.0.0より前）</h2>
    <details class="card">
      <summary style="cursor:pointer;color:var(--gold);">v0.1.0〜v0.61.3（全${PRE_V1_CHANGELOG.length}件・タップで展開）</summary>
      <div class="tbl-wrap" style="max-height:420px;margin-top:10px;">${rows}</div>
    </details>`;
}
function kpi(v,l){ return `<div class="kpi"><div class="v">${esc(v)}</div><div class="l">${esc(l)}</div></div>`; }
function agg(obj,key,winner){ key=key||'?'; obj[key]=obj[key]||{games:0,pw:0}; obj[key].games++; if(winner==='player')obj[key].pw++; }
function bars(rows){
  const max=Math.max(1,...rows.map(r=>r.value||0));
  return rows.map(r=>`<div class="bar-row"><div class="bar-label">${esc(r.label)}</div>
    <div class="bar-track"><div class="bar-fill ${r.cls||''}" style="width:${(r.value||0)/max*100}%"></div></div>
    <div class="bar-val">${esc(r.sub!=null?r.sub:r.value)}</div></div>`).join('');
}
function aggBars(obj,labelMap){
  const keys=Object.keys(obj).sort();
  if(!keys.length) return '<div class="muted">データなし</div>';
  return bars(keys.map(k=>({ label:(labelMap[k]||k), value:obj[k].games, sub:`${pctOf(obj[k].pw,obj[k].games)}（${obj[k].games}戦）` })));
}
function binBars(bins,unit){
  const keys=Object.keys(bins).map(Number).sort((a,b)=>a-b);
  return bars(keys.map(k=>({ label:`${k}〜${k+ (unit==='pt'?9:4)}${unit}`, value:bins[k], sub:String(bins[k]) })));
}

// ===== 生データテーブル =====
function filtered(){
  const s=tableState;
  const base=showHidden?allLogs.filter(isGameRecord):visibleLogs();
  let rows=base.filter(g=>{
    if(s.fWinner && g.winner!==s.fWinner) return false;
    if(s.fDiff && g.cpuDifficulty!==s.fDiff) return false;
    if(s.fVer && g.version!==s.fVer) return false;
    if(s.q){ const hay=(g.playerName||'')+' '+(g.playerId||'')+' '+(g.version||''); if(!hay.toLowerCase().includes(s.q.toLowerCase())) return false; }
    return true;
  });
  const k=s.sortKey, dir=s.sortDir;
  rows.sort((a,b)=>{ let x=a[k],y=b[k]; if(k==='margin'){x=(a.playerFinal||0)-(a.cpuFinal||0);y=(b.playerFinal||0)-(b.cpuFinal||0);}
    if(x==null)x=''; if(y==null)y=''; return (x>y?1:x<y?-1:0)*dir; });
  return rows;
}
function tableUI(){
  const vers=[...new Set(allLogs.filter(isGameRecord).map(g=>g.version).filter(Boolean))].sort().reverse();
  const opt=(arr,cur,map)=>arr.map(v=>`<option value="${esc(v)}" ${v===cur?'selected':''}>${esc(map?(map[v]||v):v)}</option>`).join('');
  return `<div class="filters">
    <select id="fWinner"><option value="">勝者:すべて</option>${opt(['player','cpu','draw'],tableState.fWinner,{player:'プレイヤー',cpu:'CPU',draw:'引分'})}</select>
    <select id="fDiff"><option value="">難易度:すべて</option>${opt(['weak','normal','strong'],tableState.fDiff,DIFF)}</select>
    <select id="fVer"><option value="">バージョン:すべて</option>${opt(vers,tableState.fVer)}</select>
    <input id="fq" placeholder="名前/ID/ver 検索" value="${esc(tableState.q)}">
    <span class="muted" id="rowCount"></span>
  </div>
  <div class="tbl-wrap"><table><thead><tr>
    ${th('ts','日時')}${th('version','ver')}${th('winner','勝者')}${th('playerName','名前')}${th('playerFinal','P')}${th('cpuFinal','C')}${th('margin','差')}
    ${th('cpuDifficulty','難易度')}${th('cpuStrategy','性格')}${th('playTimeMs','時間')}<th>ID</th><th>操作</th>
  </tr></thead><tbody id="tbody"></tbody></table></div>`;
}
function th(key,label){ const s=tableState; const ar=s.sortKey===key?(s.sortDir<0?' ▼':' ▲'):''; return `<th data-k="${key}">${esc(label)}${ar}</th>`; }
function renderRows(){
  const rows=filtered();
  $('rowCount').textContent=`${rows.length} 件`;
  $('tbody').innerHTML=rows.slice(0,500).map((g,i)=>{
    const wl=g.winner==='player'?'win':(g.winner==='cpu'?'lose':'draw');
    const wt=g.winner==='player'?'P勝':(g.winner==='cpu'?'C勝':'分');
    const idx=allLogs.indexOf(g);
    const t=jstFromIso(g.ts, false);
    const tm=typeof g.playTimeMs==='number'?Math.round(g.playTimeMs/1000)+'s':'-';
    const hidden=isHidden('logs',g._id);
    return `<tr class="row" data-i="${idx}"${hidden?' style="opacity:.5;"':''}>
      <td>${esc(t)}</td><td>${esc(g.version||'')}</td><td><span class="tag ${wl}">${wt}</span></td>
      <td>${esc(g.playerName||'-')}</td>
      <td>${esc(g.playerFinal)}</td><td>${esc(g.cpuFinal)}</td><td>${esc((g.playerFinal||0)-(g.cpuFinal||0))}</td>
      <td>${esc(DIFF[g.cpuDifficulty]||g.cpuDifficulty||'')}</td><td>${esc(TYPE[g.cpuStrategy]||g.cpuStrategy||'')}</td>
      <td>${tm}</td><td>${esc((g.playerId||'').slice(0,8))}</td><td>${hideBtnHTML('logs',g._id)}</td></tr>`;
  }).join('') || '<tr><td colspan="12" class="muted" style="text-align:center;padding:16px;">該当なし</td></tr>';
  document.querySelectorAll('#tbody .row').forEach(tr=>tr.onclick=()=>showDetail(Number(tr.dataset.i)));
  bindHideButtons();
}
function setHead(){
  const tb=$('tbody'); if(!tb) return;
  const head=tb.closest('table').querySelector('thead');
  head.innerHTML=`<tr>${th('ts','日時')}${th('version','ver')}${th('winner','勝者')}${th('playerName','名前')}${th('playerFinal','P')}${th('cpuFinal','C')}${th('margin','差')}${th('cpuDifficulty','難易度')}${th('cpuStrategy','性格')}${th('playTimeMs','時間')}<th>ID</th><th>操作</th></tr>`;
  head.querySelectorAll('th[data-k]').forEach(el=>{
    el.onclick=()=>{ const k=el.dataset.k; if(tableState.sortKey===k)tableState.sortDir*=-1; else {tableState.sortKey=k;tableState.sortDir=-1;} setHead(); renderRows(); };
  });
}
function bindTable(){
  const bind=(id,key)=>{ const el=$(id); if(el)el.onchange=()=>{ tableState[key]=el.value; renderRows(); }; };
  bind('fWinner','fWinner'); bind('fDiff','fDiff'); bind('fVer','fVer');
  const q=$('fq'); if(q)q.oninput=()=>{ tableState.q=q.value; renderRows(); };
  setHead();
  renderRows();
}

// ===== 詳細モーダル =====
function showDetail(i){
  const g=allLogs[i]; if(!g) return;
  const log=Array.isArray(g.log)?g.log:[];
  const rounds=log.map(r=>{
    const dl=r.dealerIsYou?'あなた(親)':'相手(親)', cl=r.dealerIsYou?'相手(子)':'あなた(子)';
    let res=r.passed?'撤退':(r.result==='draw'?'引分':(r.result==='dealer'?dl+'勝ち':cl+'勝ち'));
    if(!r.passed&&r.result!=='draw') res+=` (+${r.dmg||0})`;
    return `<div class="rrow"><div class="rt"><span>第${r.round}R</span><span>${r.dealerIsYou?'あなたが親':'相手が親'}</span></div>
      <div style="margin-top:3px;">
        <span class="ctag c-${r.dealerCard.attr}">${dl} ${AJP[r.dealerCard.attr]}${r.dealerCard.num}</span>
        <span class="muted"> vs </span>
        <span class="ctag c-${r.childCard.attr}">${cl} ${AJP[r.childCard.attr]}${r.childCard.num}</span>
        <span style="float:right;color:var(--dim);">${esc(res)}</span></div></div>`;
  }).join('') || '<div class="muted">ラウンド詳細なし</div>';
  $('detailInner').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <h2 style="margin:0;">対戦詳細</h2><span class="btn" id="closeDetail">閉じる</span></div>
    <div class="muted" style="font-size:12px;margin-bottom:10px;">
      プレイヤー <b style="color:var(--goldb)">${esc(g.playerName||'（名前なし）')}</b><br>
      ${esc(jstFromIso(g.ts, true))} ／ ${esc(g.version||'')} ／ CPU:${esc(TYPE[g.cpuStrategy]||g.cpuStrategy)}/${esc(DIFF[g.cpuDifficulty]||g.cpuDifficulty)}<br>
      最終 P<b style="color:var(--goldb)">${esc(g.playerFinal)}</b> - C<b style="color:var(--goldb)">${esc(g.cpuFinal)}</b>
      ／ ID ${esc((g.playerId||'').slice(0,12))}
    </div>${rounds}`;
  $('detailModal').classList.add('show');
  $('closeDetail').onclick=()=>$('detailModal').classList.remove('show');
}

// ===== エクスポート =====
function download(name,text,type){
  const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function exportJSON(){ download('maskd-logs.json', JSON.stringify(visibleLogs(),null,2), 'application/json'); }
function exportCSV(){
  const cols=['ts','version','playerId','winner','playerFinal','cpuFinal','playerScore','cpuScore','rounds','cpuStrategy','cpuDifficulty','youWins','cpuWins','draws','passes','youAir','cpuAir','youKaos','cpuKaos','playTimeMs'];
  const head=cols.join(',');
  const body=visibleLogs().map(g=>cols.map(c=>{ let v=g[c]; if(v==null)v=''; v=String(v).replace(/"/g,'""'); return /[",\n]/.test(v)?`"${v}"`:v; }).join(',')).join('\n');
  download('maskd-logs.csv', head+'\n'+body, 'text/csv');
}

// テスト用フック(モックデータで描画を確認する。害はない)
window.__adminMock=(logs,count,surveys,players,playerCount,hiddenEvents,visits,visitCount)=>{
  allLogs=logs; totalCount=count;
  if(surveys)allSurveys=surveys;
  if(players){ allPlayers=players; totalPlayers=(playerCount!=null)?playerCount:players.length; }
  if(visits){ allVisits=visits; totalVisits=(visitCount!=null)?visitCount:visits.length; }
  if(hiddenEvents){
    const events=[...hiddenEvents].sort((a,b)=>tsMillis(a)-tsMillis(b));
    hiddenMap={};
    events.forEach(e=>{ if(e && e.col && e.docId) hiddenMap[e.col+'|'+e.docId]=(e.action==='hide'); });
  }
  render();
};

// ===== 起動 =====
$('unlockBtn').onclick=tryUnlock;
$('pass').addEventListener('keydown',e=>{ if(e.key==='Enter')tryUnlock(); });
$('showHiddenBtn').onclick=()=>{ showHidden=!showHidden; $('showHiddenBtn').textContent=showHidden?'非表示を隠す':'非表示も表示'; render(); };
$('reloadBtn').onclick=loadData;
$('csvBtn').onclick=exportCSV;
$('jsonBtn').onclick=exportJSON;
$('lockBtn').onclick=lock;
$('detailModal').onclick=e=>{ if(e.target===$('detailModal'))$('detailModal').classList.remove('show'); };
(async ()=>{
  const auto=await tryAutoUnlockFromURL();
  let already=false; try{ already=sessionStorage.getItem(UNLOCK_KEY)==='1'; }catch(e){}
  if(auto||already) showDash();
})();
</script>
